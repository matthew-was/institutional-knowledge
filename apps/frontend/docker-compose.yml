# apps/frontend/docker-compose.yml — Frontend + backend development environment (hot-reload)
#
# Starts PostgreSQL, the Express backend, and the Next.js frontend with hot-reload enabled.
# Source files are bind-mounted so code changes are reflected immediately.
# The Python processing service is not started — document upload and query features
# that call the processing service will not function, but all UI, metadata editing,
# and vocabulary management features will.
#
# Run from the repository root:
#   docker compose -f apps/frontend/docker-compose.yml up
#
# Configuration is read from config.json in each service directory (committed defaults).
# Place a config.override.json alongside it to override values locally.
# config.override.json is git-ignored.
#
# The Postgres init credentials below must match database.url in
# apps/backend/config.json.

services:

  # ── PostgreSQL + pgvector ──────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: institutional_knowledge
      POSTGRES_USER: ik_user
      POSTGRES_PASSWORD: ik_local_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ik_user -d institutional_knowledge"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── Express backend (hot-reload) ───────────────────────────────────────────
  backend:
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
      target: deps
    command: ["pnpm", "--filter", "backend", "dev"]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"
    volumes:
      - ../../apps/backend/src:/app/apps/backend/src
      - ../../packages/shared/src:/app/packages/shared/src
      - ../../apps/backend/config.json5:/app/apps/backend/config.json5:ro
      # - ../../apps/backend/config.override.json5:/app/apps/backend/config.override.json5:ro
    restart: unless-stopped

  # ── Next.js frontend (hot-reload) ─────────────────────────────────────────
  # Next.js dev server provides fast refresh — React state is preserved across
  # most code changes without a full page reload.
  frontend:
    build:
      context: ../..
      dockerfile: apps/frontend/Dockerfile
      target: deps
    command: ["pnpm", "--filter", "frontend", "dev"]
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ../../apps/frontend/src:/app/apps/frontend/src
      - ../../apps/frontend/public:/app/apps/frontend/public
      - ../../packages/shared/src:/app/packages/shared/src
      - ../../apps/frontend/config.json:/app/apps/frontend/config.json:ro
      # - ../../apps/frontend/config.override.json:/app/apps/frontend/config.override.json:ro
    restart: unless-stopped

volumes:
  postgres_data:
