# apps/backend/docker-compose.test.yml — Throwaway test database for integration tests
#
# Starts a fresh PostgreSQL+pgvector instance with a dedicated test database.
# Use this when running integration tests locally:
#
#   docker compose -f apps/backend/docker-compose.test.yml up -d
#   TEST_DATABASE_URL=postgresql://ik_test:ik_test@localhost:5433/ik_test pnpm --filter backend test
#   docker compose -f apps/backend/docker-compose.test.yml down -v
#
# Port 5433 avoids conflicts with the dev database on 5432.
# No persistent volume — data is discarded on `down -v`.

services:
  postgres-test:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ik_test
      POSTGRES_USER: ik_test
      POSTGRES_PASSWORD: ik_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ik_test -d ik_test"]
      interval: 5s
      timeout: 3s
      retries: 10
