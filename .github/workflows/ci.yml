# CI pipeline — runs on every push and every pull request to main.
#
# Branch protection requirement:
#   All jobs in this workflow must pass before a pull request to main can be
#   merged. Enable branch protection in GitHub repository settings:
#     Settings → Branches → Add rule → Branch name pattern: main
#     Check: "Require status checks to pass before merging"
#     Add status checks: lint-and-typecheck, test-backend
#   Add test-frontend and test-python to the required checks list as those
#   services are implemented.
#
# Required GitHub Actions secrets (none at this time):
#   The backend integration test database uses hardcoded credentials defined
#   in docker-compose.test.yml (ik_test/ik_test/ik_test). This is deliberate:
#   the test database is ephemeral and contains no real data. No secrets are
#   required for the current test suite.

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Lint and typecheck — all TypeScript workspace packages
  # ---------------------------------------------------------------------------
  lint-and-typecheck:
    name: Lint and typecheck (TypeScript)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Node version is read from .nvmrc at the repository root.
          # Do not hardcode the version here — update .nvmrc to change it.
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint backend (Biome)
        run: pnpm --filter backend exec biome check

      - name: Lint shared package (Biome)
        run: pnpm --filter @institutional-knowledge/shared exec biome check

      # frontend lint step — uncomment when apps/frontend/ is scaffolded
      # - name: Lint frontend (Biome)
      #   run: pnpm --filter frontend exec biome check

      - name: Typecheck all workspaces
        run: pnpm -r typecheck

  # ---------------------------------------------------------------------------
  # Backend tests
  #
  # Runs all Vitest tests for apps/backend/. The test suite contains both unit
  # tests (no database required) and integration tests (require PostgreSQL).
  # A service container provides the database; it is exposed on localhost:5433
  # to match the hardcoded connection string in migrations.integration.test.ts.
  #
  # The connection string is intentionally hardcoded in the integration test
  # (not read from an environment variable) — this avoids a second config
  # surface. Credentials match docker-compose.test.yml: ik_test/ik_test/ik_test.
  # ---------------------------------------------------------------------------
  test-backend:
    name: Test backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: ik_test
          POSTGRES_USER: ik_test
          POSTGRES_PASSWORD: ik_test
        # Expose on host port 5433 to match the hardcoded test connection string.
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U ik_test -d ik_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run backend tests
        run: pnpm --filter backend test

      - name: Upload backend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: apps/backend/coverage/
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Frontend tests — placeholder, enabled when apps/frontend/ is scaffolded
