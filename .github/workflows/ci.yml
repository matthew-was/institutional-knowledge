# CI pipeline — runs on every push and every pull request to main.
#
# Branch protection requirement:
#   All jobs in this workflow must pass before a pull request to main can be
#   merged. Enable branch protection in GitHub repository settings:
#     Settings → Branches → Add rule → Branch name pattern: main
#     Check: "Require status checks to pass before merging"
#     Add status checks: lint-and-typecheck, test-backend, test-frontend,
#       test-frontend-e2e, test-python
#
# Required GitHub Actions secrets (none at this time):
#   The backend integration test database uses hardcoded credentials defined
#   in docker-compose.test.yml (ik_test/ik_test/ik_test). This is deliberate:
#   the test database is ephemeral and contains no real data. No secrets are
#   required for the current test suite.

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Lint and typecheck — all TypeScript workspace packages
  # ---------------------------------------------------------------------------
  lint-and-typecheck:
    name: Lint and typecheck (TypeScript)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          # Node version is read from .nvmrc at the repository root.
          # Do not hardcode the version here — update .nvmrc to change it.
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @institutional-knowledge/shared build

      - name: Lint (Biome)
        run: pnpm lint

      - name: Typecheck all workspaces
        run: pnpm typecheck

  # ---------------------------------------------------------------------------
  # Backend tests
  #
  # Runs all Vitest tests for apps/backend/. The test suite contains both unit
  # tests (no database required) and integration tests (require PostgreSQL).
  # A service container provides the database; it is exposed on localhost:5433
  # to match the hardcoded connection string in migrations.integration.test.ts.
  #
  # The connection string is intentionally hardcoded in the integration test
  # (not read from an environment variable) — this avoids a second config
  # surface. Credentials match docker-compose.test.yml: ik_test/ik_test/ik_test.
  # ---------------------------------------------------------------------------
  test-backend:
    name: Test backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: ik_test
          POSTGRES_USER: ik_test
          POSTGRES_PASSWORD: ik_test
        # Expose on host port 5433 to match the hardcoded test connection string.
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U ik_test -d ik_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @institutional-knowledge/shared build

      - name: Run backend tests
        run: pnpm --filter backend test

      - name: Upload backend coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: apps/backend/coverage/
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Frontend tests
  # ---------------------------------------------------------------------------
  test-frontend:
    name: Test frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @institutional-knowledge/shared build

      - name: Run frontend tests
        run: pnpm --filter frontend test

  # ---------------------------------------------------------------------------
  # Frontend E2E tests (Playwright)
  #
  # Runs the five Playwright scenarios against a real Hono custom server with a
  # lightweight mock Express server on port 4000. Chromium is the only browser
  # used in CI (matches playwright.config.ts). The Hono dev server is started
  # by Playwright's webServer block; the mock Express server is started via
  # globalSetup. A valid config.override.json is required because the Hono
  # server reads config at startup — the override supplies dummy values that
  # satisfy the schema without real service credentials.
  #
  # Upload the Playwright HTML report as an artifact on failure so test traces
  # can be inspected without re-running locally.
  #
  # When enabling branch protection: add test-frontend-e2e to required checks.
  # ---------------------------------------------------------------------------
  test-frontend-e2e:
    name: Test frontend E2E (Playwright)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @institutional-knowledge/shared build

      - name: Install Playwright browsers
        run: pnpm --filter frontend exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm --filter frontend test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/frontend/playwright-report/
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Python tests
  # The Python version is read from services/processing/.python-version — do
  # not hardcode the version in this workflow.
  # ---------------------------------------------------------------------------
  test-python:
    name: Test Python processing service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Python version is read from services/processing/.python-version.
          # Do not hardcode the version here — update .python-version to change it.
          python-version-file: services/processing/.python-version

      - name: Install Python dependencies
        working-directory: services/processing
        run: pip install -r requirements-dev.txt

      - name: Run Python tests
        working-directory: services/processing
        run: pytest
