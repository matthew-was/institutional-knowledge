[tool.ruff]
target-version = "py313"
line-length = 88
exclude = ["shared/generated/"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "ANN"]

[tool.ruff.lint.per-file-ignores]
# Prompt strings in LLM adapters legitimately exceed the line length limit
"shared/adapters/ollama_llm.py" = ["E501"]

[tool.mypy]                                                                                                                                                                                                                                                                             
ignore_missing_imports = true 

[tool.coverage.run]
omit = [
    "*/tests/*",
    "*/shared/generated/*",
    "**/interfaces/*"
]
